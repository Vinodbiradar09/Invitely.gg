<svg
  xmlns="http://www.w3.org/2000/svg"
  width="32"
  height="32"
  viewBox="0 0 24 24"
  fill="none"
>
  <!-- Dark background (perfect for your dark landing page + navbar) -->
  <rect
    width="24"
    height="24"
    fill="#0A0A0A"
    rx="7"
  />

  <!-- Outer rounded container – premium modern app-icon frame (Linear-style) -->
  <rect
    x="2.5"
    y="2.5"
    width="19"
    height="19"
    rx="5.5"
    stroke="#FFFFFF"
    stroke-width="1.1"
  />

  <!-- Core circle – Grok-inspired energy core (event community feel) -->
  <circle
    cx="12"
    cy="12"
    r="6.8"
    stroke="#FFFFFF"
    stroke-width="1.25"
  />

  <!-- Dynamic parallel diagonal stripes – "invitations at scale" + AI flow (Linear-inspired) -->
  <!-- Rotated group for perfect 40° angle -->
  <g transform="translate(12 12) rotate(-40)">
    <!-- Stripe 1 (left) -->
    <rect
      x="-4.8"
      y="-5.4"
      width="1.65"
      height="10.8"
      rx="0.3"
      fill="#FFFFFF"
      stroke="none"
    />
    <!-- Stripe 2 (middle) – main flow -->
    <rect
      x="-1.55"
      y="-5.4"
      width="1.65"
      height="10.8"
      rx="0.3"
      fill="#FFFFFF"
      stroke="none"
    />
    <!-- Stripe 3 (right) -->
    <rect
      x="1.7"
      y="-5.4"
      width="1.65"
      height="10.8"
      rx="0.3"
      fill="#FFFFFF"
      stroke="none"
    />
  </g>
</svg>
